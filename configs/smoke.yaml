preprocess:
  data_dir: data
  critical_rule: high_acuity_admit
  drop_unlabeled_acuity: true
  text_field: chiefcomplaint
model:
  num_regions: 12
  n_instruction_classes: 3
  ft_d_token: 64
  ft_n_blocks: 2
  ft_n_heads: 4
  ft_ffn_mult: 2.0
  text_backbone: lite
  text_d_model: 64
  text_n_blocks: 2
  text_n_heads: 4
  text_max_len: 32
  text_hf_name: emilyalsentzer/Bio_ClinicalBERT
  text_freeze: true
  d_state: 128
  mapper_hidden: 64
  vpm_height: 64
  vpm_width: 48
  vpm_alpha: 0.6
  vpm_channels: 3
  field_base_sigma_scale: 1.0
  body_masked: true
  vision_backbone: lite
  vit_d_model: 96
  vit_patch: 8
  vit_n_blocks: 2
  vit_n_heads: 4
  vit_use_cls: true
  vit_timm_name: vit_tiny_patch16_224
  fusion_d_model: 128
  fusion_n_heads: 4
  fusion_ffn_mult: 2.0
  head_hidden: 64
  use_rationale: true
  rationale_backend: lite
  rationale_d_model: 96
  rationale_n_blocks: 2
  rationale_n_heads: 4
  rationale_max_len: 48
  dropout: 0.1
train:
  epochs: 6
  batch_size: 32
  lr: 0.002
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 0
  device: cpu
  num_workers: 0
  n_folds: 2
  val_fraction: 0.2
  text_max_len: 32
  rationale_max_len: 48
  use_class_weight: true
  use_pos_weight: true
  use_rationale: true
  use_real_bertscore: false
  log_every: 0
  num_threads: 0
